<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Redis operations decision map</title>
  <desc id="desc">A Redis decision map from service role to persistence, failover, memory, and lock checks.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2l10 5-10 5z" fill="#b91c1c"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="96" y="90" fill="#111827" font-size="46" font-weight="800">Redis를 고르기 전에 물어볼 것</text>
    <text x="96" y="132" fill="#6b7280" font-size="24">데이터 역할이 달라지면 장애 때의 선택도 달라진다</text>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="96" y="212" width="320" height="476" rx="26" fill="#fff7ed" stroke="#fed7aa" stroke-width="3"/>
    <text x="256" y="268" text-anchor="middle" fill="#9a3412" font-size="30" font-weight="800">1. 맡은 일</text>
    <text x="142" y="340" fill="#374151" font-size="23">Cache</text>
    <text x="142" y="408" fill="#374151" font-size="23">Session</text>
    <text x="142" y="476" fill="#374151" font-size="23">Rate limit</text>
    <text x="142" y="544" fill="#374151" font-size="23">Ranking</text>
    <text x="142" y="612" fill="#374151" font-size="23">Lock</text>
  </g>
  <g fill="none" stroke="#b91c1c" stroke-width="8" stroke-linecap="round">
    <path d="M426 450h128" marker-end="url(#arrow)"/>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="586" y="176" width="428" height="548" rx="30" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
    <text x="800" y="232" text-anchor="middle" fill="#111827" font-size="30" font-weight="800">2. 운영 질문</text>
    <g transform="translate(646 294)">
      <rect width="308" height="64" rx="16" fill="#fee2e2"/>
      <rect y="94" width="308" height="64" rx="16" fill="#fef3c7"/>
      <rect y="188" width="308" height="64" rx="16" fill="#dcfce7"/>
      <rect y="282" width="308" height="64" rx="16" fill="#dbeafe"/>
      <text x="154" y="40" text-anchor="middle" fill="#991b1b" font-size="22" font-weight="800">사라져도 되는가?</text>
      <text x="154" y="134" text-anchor="middle" fill="#92400e" font-size="22" font-weight="800">얼마나 빨리 복구할까?</text>
      <text x="154" y="228" text-anchor="middle" fill="#166534" font-size="22" font-weight="800">무엇을 지울까?</text>
      <text x="154" y="322" text-anchor="middle" fill="#1e40af" font-size="22" font-weight="800">중복 실행은 안전한가?</text>
    </g>
  </g>
  <g fill="none" stroke="#b91c1c" stroke-width="8" stroke-linecap="round">
    <path d="M1024 450h128" marker-end="url(#arrow)"/>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="1184" y="212" width="320" height="476" rx="26" fill="#fef2f2" stroke="#fecaca" stroke-width="3"/>
    <text x="1344" y="268" text-anchor="middle" fill="#991b1b" font-size="30" font-weight="800">3. 남길 증거</text>
    <text x="1230" y="342" fill="#374151" font-size="22">failover time</text>
    <text x="1230" y="410" fill="#374151" font-size="22">lost write count</text>
    <text x="1230" y="478" fill="#374151" font-size="22">evicted keys</text>
    <text x="1230" y="546" fill="#374151" font-size="22">command p99</text>
    <text x="1230" y="614" fill="#374151" font-size="22">duplicate execution</text>
  </g>
</svg>
