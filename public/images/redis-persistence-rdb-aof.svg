<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Redis RDB and AOF comparison</title>
  <desc id="desc">A comparison of RDB snapshots and AOF write logs as Redis data loss choices.</desc>
  <rect width="1600" height="900" fill="#fffdf8"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="96" y="118" fill="#111827" font-size="56" font-weight="800">RDB vs AOF</text>
    <text x="96" y="166" fill="#6b7280" font-size="26">Question: what can disappear after restart?</text>
    <rect x="96" y="250" width="620" height="430" rx="24" fill="#fff" stroke="#fecaca" stroke-width="4"/>
    <rect x="884" y="250" width="620" height="430" rx="24" fill="#fff" stroke="#bae6fd" stroke-width="4"/>
    <text x="406" y="320" fill="#991b1b" text-anchor="middle" font-size="42" font-weight="800">RDB</text>
    <text x="1194" y="320" fill="#075985" text-anchor="middle" font-size="42" font-weight="800">AOF</text>
    <text x="406" y="390" fill="#374151" text-anchor="middle" font-size="28">snapshot at a point in time</text>
    <text x="1194" y="390" fill="#374151" text-anchor="middle" font-size="28">write commands as a log</text>
    <text x="406" y="480" fill="#111827" text-anchor="middle" font-size="30" font-weight="700">smaller file</text>
    <text x="406" y="532" fill="#111827" text-anchor="middle" font-size="30" font-weight="700">faster restart</text>
    <text x="406" y="584" fill="#991b1b" text-anchor="middle" font-size="26">may lose recent writes</text>
    <text x="1194" y="480" fill="#111827" text-anchor="middle" font-size="30" font-weight="700">less recent loss</text>
    <text x="1194" y="532" fill="#111827" text-anchor="middle" font-size="30" font-weight="700">better for sessions</text>
    <text x="1194" y="584" fill="#075985" text-anchor="middle" font-size="26">watch file and rewrite cost</text>
    <path d="M742 466h116" stroke="#dc2626" stroke-width="10" stroke-linecap="round"/>
    <path d="M845 445l34 21-34 21z" fill="#dc2626"/>
    <text x="800" y="760" fill="#111827" text-anchor="middle" font-size="34" font-weight="800">Good choice = explainable loss boundary</text>
  </g>
</svg>
