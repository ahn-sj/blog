<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Failure propagation versus containment flow</title>
  <desc id="desc">A side by side visual comparison of unbounded failure propagation and bounded failure containment.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="bad-arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2l10 5-10 5z" fill="#ea580c"/>
    </marker>
    <marker id="good-arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2l10 5-10 5z" fill="#047857"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="96" y="90" fill="#111827" font-size="48" font-weight="800">Failure propagation vs containment</text>
    <text x="96" y="134" fill="#64748b" font-size="25">compare the same dependency failure before and after bounded controls</text>
  </g>
  <g transform="translate(96 190)" filter="url(#shadow)">
    <rect width="650" height="610" rx="28" fill="#fff7ed" stroke="#fed7aa" stroke-width="3"/>
    <rect x="36" y="36" width="578" height="72" rx="18" fill="#fed7aa"/>
    <text x="72" y="82" fill="#9a3412" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800">Unbounded path</text>
    <g fill="#ffffff" stroke="#fb923c" stroke-width="3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
      <rect x="70" y="178" width="170" height="96" rx="18"/>
      <rect x="410" y="178" width="170" height="96" rx="18"/>
      <rect x="70" y="386" width="170" height="96" rx="18"/>
      <rect x="410" y="386" width="170" height="96" rx="18"/>
    </g>
    <g fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="23" font-weight="800" text-anchor="middle">
      <text x="155" y="220">API</text>
      <text x="495" y="220">Provider</text>
      <text x="155" y="428">DB pool</text>
      <text x="495" y="428">Other API</text>
    </g>
    <g fill="#64748b" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" text-anchor="middle">
      <text x="155" y="250">request waits</text>
      <text x="495" y="250">hangs</text>
      <text x="155" y="458">held too long</text>
      <text x="495" y="458">also slows</text>
    </g>
    <g fill="none" stroke="#ea580c" stroke-width="8" stroke-linecap="round">
      <path d="M240 226h156" marker-end="url(#bad-arrow)"/>
      <path d="M495 276c0 90-64 118-154 150" marker-end="url(#bad-arrow)"/>
      <path d="M240 434h156" marker-end="url(#bad-arrow)" stroke-dasharray="18 18"/>
      <path d="M154 276c-34 80-34 126 0 190" marker-end="url(#bad-arrow)"/>
    </g>
    <g fill="#dc2626" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800">
      <text x="70" y="552">Result: larger blast radius, high p99, pool saturation</text>
    </g>
  </g>
  <g transform="translate(854 190)" filter="url(#shadow)">
    <rect width="650" height="610" rx="28" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="3"/>
    <rect x="36" y="36" width="578" height="72" rx="18" fill="#bbf7d0"/>
    <text x="72" y="82" fill="#047857" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800">Bounded path</text>
    <g fill="#ffffff" stroke="#34d399" stroke-width="3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
      <rect x="70" y="178" width="170" height="96" rx="18"/>
      <rect x="410" y="178" width="170" height="96" rx="18"/>
      <rect x="70" y="386" width="170" height="96" rx="18"/>
      <rect x="410" y="386" width="170" height="96" rx="18"/>
    </g>
    <g fill="#111827" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="23" font-weight="800" text-anchor="middle">
      <text x="155" y="220">API</text>
      <text x="495" y="220">Provider</text>
      <text x="155" y="428">Bulkhead</text>
      <text x="495" y="428">Fallback</text>
    </g>
    <g fill="#64748b" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" text-anchor="middle">
      <text x="155" y="250">budgeted wait</text>
      <text x="495" y="250">protected</text>
      <text x="155" y="458">isolated</text>
      <text x="495" y="458">reduced response</text>
    </g>
    <g fill="none" stroke="#047857" stroke-width="8" stroke-linecap="round">
      <path d="M240 226h110" marker-end="url(#good-arrow)"/>
      <path d="M410 276c-56 56-108 78-170 118" marker-end="url(#good-arrow)"/>
      <path d="M240 434h156" marker-end="url(#good-arrow)"/>
    </g>
    <g transform="translate(352 174)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
      <rect width="92" height="104" rx="18" fill="#111827"/>
      <text x="46" y="42" fill="#ffffff" font-size="18" font-weight="800" text-anchor="middle">CB</text>
      <text x="46" y="72" fill="#ffffff" font-size="18" font-weight="800" text-anchor="middle">open</text>
    </g>
    <g fill="#047857" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800">
      <text x="70" y="552">Result: smaller blast radius, bounded p99, isolated pool</text>
    </g>
  </g>
</svg>
