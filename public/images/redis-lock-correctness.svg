<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Redis lock correctness</title>
  <desc id="desc">A Redis lock flow showing TTL, duplicate execution, and final safety checks.</desc>
  <rect width="1600" height="900" fill="#fffdf8"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="96" y="118" fill="#111827" font-size="56" font-weight="800">Lock Correctness</text>
    <text x="96" y="166" fill="#6b7280" font-size="26">Question: where is duplicate execution stopped?</text>
    <rect x="110" y="310" width="300" height="145" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <rect x="502" y="310" width="300" height="145" rx="24" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <rect x="894" y="310" width="300" height="145" rx="24" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
    <rect x="1080" y="585" width="400" height="120" rx="24" fill="#fff" stroke="#111827" stroke-width="4"/>
    <text x="260" y="392" text-anchor="middle" fill="#166534" font-size="30" font-weight="800">acquire lock</text>
    <text x="652" y="392" text-anchor="middle" fill="#1d4ed8" font-size="30" font-weight="800">do work</text>
    <text x="1044" y="380" text-anchor="middle" fill="#991b1b" font-size="30" font-weight="800">TTL expired</text>
    <text x="1044" y="420" text-anchor="middle" fill="#991b1b" font-size="24">duplicate can enter</text>
    <text x="1280" y="655" text-anchor="middle" fill="#111827" font-size="30" font-weight="800">DB / idempotency / token</text>
    <path d="M415 382h82M807 382h82M1044 460v112" stroke="#111827" stroke-width="8" stroke-linecap="round"/>
    <path d="M480 361l28 21-28 21zM872 361l28 21-28 21zM1023 560l21 34 21-34z" fill="#111827"/>
    <text x="800" y="785" text-anchor="middle" fill="#111827" font-size="34" font-weight="800">Redis lock is not the final safety boundary</text>
  </g>
</svg>
