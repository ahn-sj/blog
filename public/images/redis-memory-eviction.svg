<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Redis memory and eviction policy</title>
  <desc id="desc">A Redis memory bar showing eviction as a choice of what data to remove.</desc>
  <rect width="1600" height="900" fill="#fffdf8"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="96" y="118" fill="#111827" font-size="56" font-weight="800">Memory Policy</text>
    <text x="96" y="166" fill="#6b7280" font-size="26">Question: what should Redis throw away?</text>
    <rect x="180" y="300" width="1240" height="150" rx="28" fill="#fff" stroke="#e5e7eb" stroke-width="4"/>
    <rect x="180" y="300" width="310" height="150" rx="28" fill="#dcfce7"/>
    <rect x="490" y="300" width="310" height="150" fill="#dbeafe"/>
    <rect x="800" y="300" width="310" height="150" fill="#fef3c7"/>
    <rect x="1110" y="300" width="310" height="150" rx="28" fill="#fee2e2"/>
    <text x="335" y="388" text-anchor="middle" fill="#166534" font-size="30" font-weight="800">cache</text>
    <text x="645" y="388" text-anchor="middle" fill="#1d4ed8" font-size="30" font-weight="800">session</text>
    <text x="955" y="388" text-anchor="middle" fill="#92400e" font-size="30" font-weight="800">counter</text>
    <text x="1265" y="388" text-anchor="middle" fill="#991b1b" font-size="30" font-weight="800">lock</text>
    <path d="M1265 486v112" stroke="#dc2626" stroke-width="12" stroke-linecap="round"/>
    <path d="M1234 572l31 48 31-48z" fill="#dc2626"/>
    <rect x="980" y="630" width="570" height="110" rx="22" fill="#fff" stroke="#fecaca" stroke-width="4"/>
    <text x="1265" y="696" text-anchor="middle" fill="#111827" font-size="32" font-weight="800">Eviction is a failure decision</text>
    <text x="800" y="790" text-anchor="middle" fill="#6b7280" font-size="26">Separate data with different loss rules</text>
  </g>
</svg>
