<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Redis event loop latency</title>
  <desc id="desc">A queue of Redis commands waiting behind a long event loop task.</desc>
  <rect width="1600" height="900" fill="#fffdf8"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="96" y="118" fill="#111827" font-size="56" font-weight="800">Event Loop Latency</text>
    <text x="96" y="166" fill="#6b7280" font-size="26">Question: what holds the loop too long?</text>
    <rect x="150" y="330" width="290" height="130" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <rect x="485" y="300" width="360" height="190" rx="24" fill="#fee2e2" stroke="#dc2626" stroke-width="5"/>
    <rect x="890" y="330" width="230" height="130" rx="24" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <rect x="1165" y="330" width="230" height="130" rx="24" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
    <text x="295" y="407" text-anchor="middle" fill="#166534" font-size="30" font-weight="800">small GET</text>
    <text x="665" y="393" text-anchor="middle" fill="#991b1b" font-size="32" font-weight="800">large command</text>
    <text x="665" y="435" text-anchor="middle" fill="#991b1b" font-size="24">holds the loop</text>
    <text x="1005" y="407" text-anchor="middle" fill="#1d4ed8" font-size="30" font-weight="800">next</text>
    <text x="1280" y="407" text-anchor="middle" fill="#92400e" font-size="30" font-weight="800">next</text>
    <path d="M445 395h35M850 395h35M1125 395h35" stroke="#111827" stroke-width="8" stroke-linecap="round"/>
    <path d="M470 374l28 21-28 21zM875 374l28 21-28 21zM1150 374l28 21-28 21z" fill="#111827"/>
    <rect x="344" y="612" width="912" height="102" rx="22" fill="#fff" stroke="#e5e7eb" stroke-width="4"/>
    <text x="800" y="677" text-anchor="middle" fill="#111827" font-size="34" font-weight="800">p99 latency follows the slow command</text>
  </g>
</svg>
