<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Redis operations overview</title>
  <desc id="desc">A simple Redis operations map showing cache, session, rate limit, persistence, failover, memory, and lock decisions.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2l10 5-10 5z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#fffdf8"/>
  <g stroke="#f1e6dc" stroke-width="2">
    <path d="M92 170h1416M92 350h1416M92 530h1416M92 710h1416"/>
    <path d="M400 170v540M800 170v540M1200 170v540"/>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="96" y="92" fill="#111827" font-size="52" font-weight="800">Redis Operations</text>
    <text x="96" y="136" fill="#6b7280" font-size="25">fast storage is only the start; operations decide what happens during failure</text>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="96" y="230" width="292" height="124" rx="20" fill="#ffffff" stroke="#fecaca" stroke-width="3"/>
    <rect x="96" y="426" width="292" height="124" rx="20" fill="#ffffff" stroke="#fecaca" stroke-width="3"/>
    <rect x="96" y="622" width="292" height="124" rx="20" fill="#ffffff" stroke="#fecaca" stroke-width="3"/>
    <text x="242" y="278" text-anchor="middle" fill="#111827" font-size="28" font-weight="800">Cache</text>
    <text x="242" y="314" text-anchor="middle" fill="#6b7280" font-size="20">can rebuild?</text>
    <text x="242" y="474" text-anchor="middle" fill="#111827" font-size="28" font-weight="800">Session</text>
    <text x="242" y="510" text-anchor="middle" fill="#6b7280" font-size="20">can lose login?</text>
    <text x="242" y="670" text-anchor="middle" fill="#111827" font-size="28" font-weight="800">Rate limit</text>
    <text x="242" y="706" text-anchor="middle" fill="#6b7280" font-size="20">open or closed?</text>
  </g>
  <g fill="none" stroke="#dc2626" stroke-width="8" stroke-linecap="round">
    <path d="M392 292h158" marker-end="url(#arrow)"/>
    <path d="M392 488h158" marker-end="url(#arrow)"/>
    <path d="M392 684h158" marker-end="url(#arrow)"/>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="580" y="206" width="436" height="564" rx="28" fill="#ffffff" stroke="#e5e7eb" stroke-width="3"/>
    <text x="798" y="260" text-anchor="middle" fill="#111827" font-size="32" font-weight="800">Operational choices</text>
    <g transform="translate(640 310)">
      <rect width="316" height="72" rx="18" fill="#fee2e2"/>
      <rect y="104" width="316" height="72" rx="18" fill="#fef3c7"/>
      <rect y="208" width="316" height="72" rx="18" fill="#dcfce7"/>
      <rect y="312" width="316" height="72" rx="18" fill="#dbeafe"/>
      <text x="158" y="46" text-anchor="middle" fill="#991b1b" font-size="24" font-weight="800">RDB / AOF</text>
      <text x="158" y="150" text-anchor="middle" fill="#92400e" font-size="24" font-weight="800">Sentinel / Cluster</text>
      <text x="158" y="254" text-anchor="middle" fill="#166534" font-size="24" font-weight="800">Eviction policy</text>
      <text x="158" y="358" text-anchor="middle" fill="#1e40af" font-size="24" font-weight="800">Lock safety</text>
    </g>
  </g>
  <g fill="none" stroke="#dc2626" stroke-width="8" stroke-linecap="round">
    <path d="M1020 488h150" marker-end="url(#arrow)"/>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="1202" y="262" width="306" height="452" rx="28" fill="#ffffff" stroke="#fecaca" stroke-width="3"/>
    <text x="1355" y="320" text-anchor="middle" fill="#111827" font-size="30" font-weight="800">Runbook answers</text>
    <text x="1246" y="390" fill="#374151" font-size="22">What can disappear?</text>
    <text x="1246" y="452" fill="#374151" font-size="22">How long to recover?</text>
    <text x="1246" y="514" fill="#374151" font-size="22">Which request fails?</text>
    <text x="1246" y="576" fill="#374151" font-size="22">What should be alerted?</text>
    <path d="M1246 625h210" stroke="#dc2626" stroke-width="16" stroke-linecap="round"/>
  </g>
</svg>
