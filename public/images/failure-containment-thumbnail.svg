<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Failure containment pattern comparison</title>
  <desc id="desc">A structured comparison of failure propagation and containment controls across service, dependency, and resource layers.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-orange" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2l10 5-10 5z" fill="#f97316"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2l10 5-10 5z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#f8fafc"/>
  <g stroke="#e5e7eb" stroke-width="2">
    <path d="M96 170h1408M96 326h1408M96 482h1408M96 638h1408M96 794h1408"/>
    <path d="M384 170v624M760 170v624M1118 170v624"/>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="96" y="92" fill="#111827" font-size="50" font-weight="800">Failure Containment Patterns</text>
    <text x="96" y="136" fill="#64748b" font-size="25">same failure, different blast radius by timeout, retry budget, breaker, and bulkhead</text>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="800" fill="#334155">
    <text x="118" y="220">Failure source</text>
    <text x="414" y="220">Unbounded path</text>
    <text x="790" y="220">Containment controls</text>
    <text x="1148" y="220">Measured result</text>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="116" y="264" width="220" height="98" rx="18" fill="#ffffff" stroke="#f97316" stroke-width="3"/>
    <rect x="116" y="420" width="220" height="98" rx="18" fill="#ffffff" stroke="#3b82f6" stroke-width="3"/>
    <rect x="116" y="576" width="220" height="98" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
    <text x="226" y="304" text-anchor="middle" fill="#111827" font-size="24" font-weight="800">Provider</text>
    <text x="226" y="336" text-anchor="middle" fill="#64748b" font-size="18">latency spike</text>
    <text x="226" y="460" text-anchor="middle" fill="#111827" font-size="24" font-weight="800">Cache</text>
    <text x="226" y="492" text-anchor="middle" fill="#64748b" font-size="18">timeout</text>
    <text x="226" y="616" text-anchor="middle" fill="#111827" font-size="24" font-weight="800">DB pool</text>
    <text x="226" y="648" text-anchor="middle" fill="#64748b" font-size="18">saturation</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-width="8">
    <path d="M350 313c88 0 90 80 174 80s86-80 174-80" stroke="#f97316" marker-end="url(#arrow-orange)"/>
    <path d="M350 469c110 0 126 84 238 84s126-84 238-84" stroke="#f97316" marker-end="url(#arrow-orange)" stroke-dasharray="18 18"/>
    <path d="M350 625c150 0 188 74 338 74" stroke="#f97316" marker-end="url(#arrow-orange)"/>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="420" y="282" width="260" height="250" rx="22" fill="#fff7ed" stroke="#fed7aa" stroke-width="3"/>
    <text x="550" y="330" text-anchor="middle" fill="#9a3412" font-size="28" font-weight="800">As-Is</text>
    <text x="550" y="372" text-anchor="middle" fill="#9a3412" font-size="20">waits too long</text>
    <text x="550" y="410" text-anchor="middle" fill="#9a3412" font-size="20">retries immediately</text>
    <text x="550" y="448" text-anchor="middle" fill="#9a3412" font-size="20">shares every pool</text>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="814" y="264" width="248" height="92" rx="18" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
    <rect x="814" y="388" width="248" height="92" rx="18" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    <rect x="814" y="512" width="248" height="92" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
    <rect x="814" y="636" width="248" height="92" rx="18" fill="#ffffff" stroke="#475569" stroke-width="3"/>
    <text x="938" y="304" text-anchor="middle" fill="#111827" font-size="24" font-weight="800">Timeout budget</text>
    <text x="938" y="336" text-anchor="middle" fill="#64748b" font-size="18">stop waiting</text>
    <text x="938" y="428" text-anchor="middle" fill="#111827" font-size="24" font-weight="800">Retry budget</text>
    <text x="938" y="460" text-anchor="middle" fill="#64748b" font-size="18">avoid storm</text>
    <text x="938" y="552" text-anchor="middle" fill="#111827" font-size="24" font-weight="800">Circuit breaker</text>
    <text x="938" y="584" text-anchor="middle" fill="#64748b" font-size="18">fail fast</text>
    <text x="938" y="676" text-anchor="middle" fill="#111827" font-size="24" font-weight="800">Bulkhead</text>
    <text x="938" y="708" text-anchor="middle" fill="#64748b" font-size="18">isolate pool</text>
  </g>
  <g fill="none" stroke="#0f766e" stroke-linecap="round" stroke-width="8">
    <path d="M1068 310h130" marker-end="url(#arrow-green)"/>
    <path d="M1068 434h130" marker-end="url(#arrow-green)"/>
    <path d="M1068 558h130" marker-end="url(#arrow-green)"/>
    <path d="M1068 682h130" marker-end="url(#arrow-green)"/>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="1228" y="282" width="242" height="372" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="1349" y="334" text-anchor="middle" fill="#111827" font-size="28" font-weight="800">Blast radius</text>
    <path d="M1272 394h154" stroke="#e2e8f0" stroke-width="18" stroke-linecap="round"/>
    <path d="M1272 394h112" stroke="#0f766e" stroke-width="18" stroke-linecap="round"/>
    <path d="M1272 468h154" stroke="#e2e8f0" stroke-width="18" stroke-linecap="round"/>
    <path d="M1272 468h78" stroke="#2563eb" stroke-width="18" stroke-linecap="round"/>
    <path d="M1272 542h154" stroke="#e2e8f0" stroke-width="18" stroke-linecap="round"/>
    <path d="M1272 542h48" stroke="#7c3aed" stroke-width="18" stroke-linecap="round"/>
    <text x="1272" y="434" fill="#64748b" font-size="18">p99 bounded</text>
    <text x="1272" y="508" fill="#64748b" font-size="18">QPS controlled</text>
    <text x="1272" y="582" fill="#64748b" font-size="18">pool isolated</text>
  </g>
</svg>
