<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Redis failure and recovery flow</title>
  <desc id="desc">A visual flow showing Redis failure injection, measurement, and operational decision making.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2l10 5-10 5z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#fffdf8"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <text x="96" y="90" fill="#111827" font-size="46" font-weight="800">작게 깨뜨리고, 숫자로 고르기</text>
    <text x="96" y="132" fill="#6b7280" font-size="24">Redis 운영 선택은 장애 주입과 복구 기록으로 검증한다</text>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="96" y="284" width="260" height="220" rx="28" fill="#ffffff" stroke="#fecaca" stroke-width="3"/>
    <text x="226" y="350" text-anchor="middle" fill="#111827" font-size="30" font-weight="800">Write</text>
    <text x="226" y="396" text-anchor="middle" fill="#6b7280" font-size="21">session, counter, lock</text>
    <text x="226" y="440" text-anchor="middle" fill="#6b7280" font-size="21">same load condition</text>
  </g>
  <g fill="none" stroke="#dc2626" stroke-width="8" stroke-linecap="round">
    <path d="M366 394h112" marker-end="url(#arrow)"/>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="510" y="236" width="300" height="316" rx="30" fill="#fef2f2" stroke="#fecaca" stroke-width="3"/>
    <text x="660" y="304" text-anchor="middle" fill="#991b1b" font-size="30" font-weight="800">Break Redis</text>
    <text x="560" y="370" fill="#374151" font-size="22">kill after write</text>
    <text x="560" y="426" fill="#374151" font-size="22">stop master</text>
    <text x="560" y="482" fill="#374151" font-size="22">fill memory</text>
  </g>
  <g fill="none" stroke="#dc2626" stroke-width="8" stroke-linecap="round">
    <path d="M820 394h112" marker-end="url(#arrow)"/>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="964" y="236" width="300" height="316" rx="30" fill="#ffffff" stroke="#fed7aa" stroke-width="3"/>
    <text x="1114" y="304" text-anchor="middle" fill="#92400e" font-size="30" font-weight="800">Measure</text>
    <text x="1014" y="370" fill="#374151" font-size="22">lost writes</text>
    <text x="1014" y="426" fill="#374151" font-size="22">failover seconds</text>
    <text x="1014" y="482" fill="#374151" font-size="22">evicted keys</text>
  </g>
  <g fill="none" stroke="#dc2626" stroke-width="8" stroke-linecap="round">
    <path d="M1274 394h112" marker-end="url(#arrow)"/>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="1418" y="284" width="86" height="220" rx="28" fill="#dc2626"/>
    <text x="1461" y="372" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">Run</text>
    <text x="1461" y="410" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">book</text>
  </g>
  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="284" y="650" width="1032" height="92" rx="24" fill="#111827"/>
    <text x="800" y="706" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="800">좋은 결론 = 설정 이름이 아니라 손실, 복구 시간, 사용자 영향을 설명하는 것</text>
  </g>
</svg>
